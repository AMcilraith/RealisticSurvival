name: Check Mod Changes

on:
  workflow_call:
    inputs:
      force_publish:
        description: 'Treat mod content as changed regardless of diff'
        type: boolean
        default: false
    outputs:
      should_publish:
        description: 'Whether publish workflows should run'
        value: ${{ jobs.check.outputs.should_publish }}
      release_version:
        description: 'Current mod release version from ci/MOD_VERSION'
        value: ${{ jobs.check.outputs.release_version }}

jobs:
  check:
    runs-on: windows-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      release_version: ${{ steps.check.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect mod content changes
        id: check
        shell: bash
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
          FORCE_PUBLISH: ${{ inputs.force_publish }}
        run: |
          set -euo pipefail
          log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"; }

          get_mod_release_version() {
            if [ -n "${NEXUS_MOD_VERSION:-}" ]; then
              if ! [[ "$NEXUS_MOD_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
                echo "NEXUS_MOD_VERSION must be major.minor (e.g. 2.0); got: $NEXUS_MOD_VERSION" >&2
                exit 1
              fi
              echo "$NEXUS_MOD_VERSION"
              return
            fi
            if [ -f ci/MOD_VERSION ]; then
              local from_file
              from_file="$(tr -d '\r\n' < ci/MOD_VERSION)"
              if ! [[ "$from_file" =~ ^[0-9]+\.[0-9]+$ ]]; then
                echo "Invalid ci/MOD_VERSION format (expected major.minor e.g. 2.0): $from_file" >&2
                exit 1
              fi
              echo "$from_file"
              return
            fi
            echo "2.0"
          }

          get_changed_files() {
            local before="${GITHUB_EVENT_BEFORE:-}"
            local after="${GITHUB_SHA:-}"
            if [ -n "$before" ] && [ -n "$after" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
              git diff --name-only "$before" "$after" 2>/dev/null || true
              return
            fi
            if [ -n "$after" ]; then
              git diff-tree --no-commit-id --name-only -r "$after" 2>/dev/null || true
              return
            fi
            git diff --name-only HEAD~1 HEAD 2>/dev/null || true
          }

          should_publish=false
          release_version="$(get_mod_release_version)"

          if [ "${FORCE_PUBLISH:-}" = "true" ]; then
            log "Mod content check skipped (force publish)"
            should_publish=true
          else
            mapfile -t changed_files < <(get_changed_files)
            patterns=('^LICENSE$' '^Packaged/' '^Source/' '^Images/' '^Licence/')
            log "Release path check saw ${#changed_files[@]} changed file(s)"
            for file in "${changed_files[@]}"; do
              [ -z "$file" ] && continue
              normalized="${file//\\//}"
              for pattern in "${patterns[@]}"; do
                if [[ "$normalized" =~ $pattern ]]; then
                  log "Mod content changed: $normalized"
                  should_publish=true
                  break 2
                fi
              done
            done
            if [ "$should_publish" = "false" ]; then
              log "No mod content paths changed; skipping Nexus and GitHub release"
            fi
          fi

          log "Release check: should_publish=$should_publish release_version=$release_version"
          echo "should_publish=$should_publish" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
