name: Publish Wiki

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'docs/**'
      - 'ci/publish-wiki.sh'
      - '.github/workflows/publish-wiki.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  wiki:
    name: Sync docs to GitHub Wiki
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish wiki
        env:
          WIKI_PUSH_TOKEN: ${{ secrets.WIKI_PUSH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: bash ci/publish-wiki.sh
