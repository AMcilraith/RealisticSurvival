name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      release_version:
        description: 'Mod release version to publish'
        type: string
        required: true
    outputs:
      published:
        description: 'Whether a GitHub release was created'
        value: ${{ jobs.github.outputs.published }}

permissions:
  contents: write

jobs:
  github:
    runs-on: windows-latest
    outputs:
      published: ${{ steps.github.outputs.published }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged zips
        uses: actions/download-artifact@v4
        with:
          name: mod-zips
          path: Packaged

      - name: Create GitHub release
        id: github
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ inputs.release_version }}
          RELEASE_NOTES: ${{ github.event.head_commit.message || 'Automated mod package build.' }}
        run: |
          set -euo pipefail
          log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"; }

          if ! [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            echo "Release version must be major.minor (e.g. 2.0); got: $RELEASE_VERSION" >&2
            exit 1
          fi

          zip_files=()
          for mod_name in RealisticCraft RealisticCraft_Plus RealisticStorage RealisticScans; do
            zip_path="Packaged/${mod_name}.zip"
            if [ ! -f "$zip_path" ]; then
              echo "Expected packaged zip not found: $zip_path" >&2
              exit 1
            fi
            zip_files+=("$zip_path")
          done

          tag="v${RELEASE_VERSION}"
          title="Realistic Survival v${RELEASE_VERSION}"
          notes="$RELEASE_NOTES"

          log "Creating GitHub release $tag with ${#zip_files[@]} asset(s)"
          gh release create "$tag" --title "$title" --notes "$notes" "${zip_files[@]}"

          echo "published=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"
          log "Published GitHub release: $tag"
