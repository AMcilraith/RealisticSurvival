name: Package Mods

on:
  workflow_call:
    inputs:
      skip_pak_build:
        description: 'Skip retoc pak build'
        type: boolean
        default: false
    outputs:
      release_version:
        description: 'Mod release version used for this package build'
        value: ${{ jobs.package.outputs.release_version }}

permissions:
  contents: read

jobs:
  package:
    runs-on: windows-latest
    outputs:
      release_version: ${{ steps.package.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mod packages
        id: package
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SN2_DF_RELEASE: ${{ vars.SN2_DF_RELEASE || vars.SDF_RELEASE }}
          SKIP_PAK_BUILD: ${{ inputs.skip_pak_build }}
          RETOC_VERSION: v0.1.4
        run: |
          set -euo pipefail

          REPO_ROOT="$GITHUB_WORKSPACE"
          SOURCE="$REPO_ROOT/Source"
          PACKAGED_DIR="$REPO_ROOT/Packaged"
          RC_MODS="$PACKAGED_DIR/RealisticCraft/Subnautica2/Binaries/Win64/ue4ss/Mods"
          RCP_MODS="$PACKAGED_DIR/RealisticCraft_Plus/Subnautica2/Binaries/Win64/ue4ss/Mods"
          RS_SCAN_MODS="$PACKAGED_DIR/RealisticScans/Subnautica2/Binaries/Win64/ue4ss/Mods"
          MOD_ROOTS=("$RC_MODS" "$RCP_MODS" "$RS_SCAN_MODS")
          LICENSE_SOURCE="$REPO_ROOT/Licence/license"
          SN2_DF_PACKAGED_MOD="$PACKAGED_DIR/SN2-DF/Subnautica2/Binaries/Win64/ue4ss/Mods/SDF"
          VERSION_FILE="$REPO_ROOT/ci/MOD_VERSION"
          CONTENT_RELEASE_MODS=(RealisticCraft RealisticCraft_Plus RealisticStorage RealisticScans)
          RETOC_EXE=""

          log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"; }
          fail() { echo "Error: $*" >&2; exit 1; }

          write_output() {
            if [ -n "${GITHUB_OUTPUT:-}" ]; then
              echo "$1=$2" >> "$GITHUB_OUTPUT"
            fi
          }

          test_mod_version_format() { [[ "$1" =~ ^[0-9]+\.[0-9]+$ ]]; }

          get_mod_release_version() {
            if [ -n "${NEXUS_MOD_VERSION:-}" ]; then
              test_mod_version_format "$NEXUS_MOD_VERSION" || fail "NEXUS_MOD_VERSION must be major.minor (e.g. 2.0); got: $NEXUS_MOD_VERSION"
              echo "$NEXUS_MOD_VERSION"
              return
            fi
            if [ -f "$VERSION_FILE" ]; then
              local from_file
              from_file="$(tr -d '\r\n' < "$VERSION_FILE")"
              test_mod_version_format "$from_file" || fail "Invalid ci/MOD_VERSION format (expected major.minor e.g. 2.0): $from_file"
              echo "$from_file"
              return
            fi
            echo "2.0"
          }

          ensure_directory() {
            if [ ! -d "$1" ]; then
              mkdir -p "$1"
              log "Created directory: $1"
            fi
          }

          native_path() {
            local path="$1"
            if command -v cygpath >/dev/null 2>&1; then
              cygpath -m "$path"
            else
              printf '%s' "$path"
            fi
          }

          ensure_native_directory() {
            local path="$1"
            python -c "
          import os, sys
          path = sys.argv[1]
          if len(path) > 3 and path[0] == '/' and path[2] == '/':
              path = f'{path[1].upper()}:{path[2:]}'
          os.makedirs(path, exist_ok=True)
          " "$(native_path "$path")"
          }

          archive_create() {
            local parent_dir="$1" zip_path="$2"
            python <<'PY' "$parent_dir" "$zip_path"
          import sys, zipfile
          from pathlib import Path
          parent_dir = Path(sys.argv[1]).resolve()
          zip_path = Path(sys.argv[2]).resolve()
          root = parent_dir / "Subnautica2"
          if not root.is_dir():
              raise SystemExit(f"Missing Subnautica2/ under {parent_dir}")
          zip_path.parent.mkdir(parents=True, exist_ok=True)
          if zip_path.exists():
              zip_path.unlink()
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for file_path in sorted(root.rglob("*")):
                  if file_path.is_file():
                      archive.write(file_path, file_path.relative_to(parent_dir).as_posix())
          PY
          }

          archive_validate() {
            local path="$1" label="${2:-archive}"
            python <<'PY' "$path" "$label"
          import sys, tarfile, zipfile
          from pathlib import Path
          path = Path(sys.argv[1])
          label = sys.argv[2]
          if not path.is_file():
              raise SystemExit(f"{label}: file not found: {path}")
          if path.stat().st_size < 1:
              raise SystemExit(f"{label}: empty file: {path}")
          with path.open("rb") as handle:
              header = handle.read(2)
          is_zip = header == b"PK"
          is_tar = tarfile.is_tarfile(path)
          if not (is_zip or is_tar):
              preview = path.read_bytes()[:200].decode("utf-8", errors="replace")
              raise SystemExit(f"{label}: not a zip or tar archive ({path.stat().st_size} bytes): {preview!r}")
          PY
          }

          archive_extract() {
            local archive_path="$1" dest_dir="$2"
            python <<'PY' "$archive_path" "$dest_dir"
          import sys, tarfile, zipfile
          from pathlib import Path
          archive_path = Path(sys.argv[1]).resolve()
          dest_dir = Path(sys.argv[2]).resolve()
          dest_dir.mkdir(parents=True, exist_ok=True)
          with archive_path.open("rb") as handle:
              header = handle.read(2)
          if header == b"PK":
              with zipfile.ZipFile(archive_path) as archive:
                  archive.extractall(dest_dir)
          elif tarfile.is_tarfile(archive_path):
              with tarfile.open(archive_path) as archive:
                  if sys.version_info >= (3, 12):
                      archive.extractall(dest_dir, filter="data")
                  else:
                      archive.extractall(dest_dir)
          else:
              raise SystemExit(f"Not a zip or tar archive: {archive_path}")
          PY
          }

          ensure_retoc() {
            if [ -n "${RETOC_PATH:-}" ] && [ -f "$RETOC_PATH" ]; then
              RETOC_EXE="$RETOC_PATH"
              log "Using retoc from RETOC_PATH: $RETOC_EXE"
              return
            fi
            local candidates=(
              "$REPO_ROOT/tools/retoc/retoc.exe"
              "${USERPROFILE:-}/scoop/shims/retoc.exe"
            )
            for candidate in "${candidates[@]}"; do
              if [ -f "$candidate" ]; then
                RETOC_EXE="$candidate"
                log "Using retoc: $RETOC_EXE"
                return
              fi
            done
            if command -v retoc >/dev/null 2>&1; then
              RETOC_EXE="$(command -v retoc)"
              log "Using retoc on PATH: $RETOC_EXE"
              return
            fi
            local tools_dir="$REPO_ROOT/tools/retoc"
            ensure_directory "$tools_dir"
            local zip_path="${TMPDIR:-/tmp}/retoc-${RETOC_VERSION}-win64.zip"
            local url="https://github.com/trumank/retoc/releases/download/${RETOC_VERSION}/retoc-x86_64-pc-windows-msvc.zip"
            log "Downloading retoc $RETOC_VERSION..."
            curl -fsSL "$url" -o "$zip_path"
            unzip -q -o "$zip_path" -d "$tools_dir"
            rm -f "$zip_path"
            RETOC_EXE="$(find "$tools_dir" -name 'retoc.exe' -type f | head -1)"
            [ -n "$RETOC_EXE" ] || fail "retoc.exe not found after extracting $url"
            log "Installed retoc to $RETOC_EXE"
          }

          invoke_retoc_to_zen() {
            local source_path="$1" target_utoc="$2" label="$3"
            local native_source native_target target_dir
            [ -e "$source_path" ] || fail "retoc source not found for ${label}: $source_path"
            target_dir="$(dirname "$target_utoc")"
            ensure_native_directory "$target_dir"
            native_source="$(native_path "$source_path")"
            native_target="$(native_path "$target_utoc")"
            log "retoc to-zen $label"
            log "  source: $native_source"
            log "  target: $native_target"
            "$RETOC_EXE" to-zen "$native_source" "$native_target" --version UE5_6
          }

          get_sn2_df_release_config() {
            local default_repo="AMcilraith/Subnautica2Mods"
            local tag="latest"
            local repo="$default_repo"
            if [ -n "${SN2_DF_RELEASE:-}" ]; then
              tag="${SN2_DF_RELEASE//[[:space:]]/}"
            elif [ -n "${SDF_RELEASE:-}" ]; then
              tag="${SDF_RELEASE//[[:space:]]/}"
            elif [ -n "${SN2_DF_RELEASE_TAG:-}" ]; then
              tag="${SN2_DF_RELEASE_TAG//[[:space:]]/}"
            fi
            [ -n "$tag" ] || tag="latest"
            if [ -n "${SN2_DF_RELEASE_REPO:-}" ]; then
              repo="${SN2_DF_RELEASE_REPO//[[:space:]]/}"
            fi
            echo "$repo|$tag"
          }

          fetch_release_json() {
            local repo="$1" tag="$2" uri response
            local headers=(-H "Accept: application/vnd.github+json")
            if [ -n "${GITHUB_TOKEN:-}" ]; then
              headers+=(-H "Authorization: Bearer $GITHUB_TOKEN")
            fi
            if [ "$tag" = "latest" ]; then
              uri="https://api.github.com/repos/$repo/releases/latest"
            else
              local encoded_tag
              encoded_tag="$(python -c "import urllib.parse; print(urllib.parse.quote('''$tag''', safe=''))")"
              uri="https://api.github.com/repos/$repo/releases/tags/$encoded_tag"
            fi
            if ! response="$(curl -fsSL "${headers[@]}" "$uri")"; then
              echo "Failed to fetch SN2-DF release metadata from $uri (repo=$repo, tag=$tag)." >&2
              echo "Publish a release at https://github.com/$repo/releases or set vars.SN2_DF_RELEASE / SN2_DF_RELEASE_TAG to a valid tag." >&2
              exit 1
            fi
            python -c "import json,sys; json.loads(sys.argv[1])" "$response" >/dev/null 2>&1 || {
              echo "GitHub API returned non-JSON for $uri (repo=$repo, tag=$tag)." >&2
              echo "Response preview: $(printf '%.200s' "$response")" >&2
              exit 1
            }
            echo "$response"
          }

          install_sn2_df_from_release() {
            local packaged_mod_dir="$1" license_source="$2"
            local repo tag release_json release_tag asset_json asset_name
            IFS='|' read -r repo tag < <(get_sn2_df_release_config)
            release_json="$(fetch_release_json "$repo" "$tag")"
            release_tag="$(python -c "import json,sys; print(json.loads(sys.argv[1])['tag_name'])" "$release_json")"
            [ -n "$release_tag" ] || fail "GitHub release response is missing tag_name (repo=$repo, requested tag=$tag)."
            asset_json="$(printf '%s' "$release_json" | python -c "
          import json, sys
          release = json.load(sys.stdin)
          assets = release.get('assets') or []
          tag = release.get('tag_name', '')
          for preferred in ('SN2-DF.zip', 'SDF.zip', 'main.dll'):
              for asset in assets:
                  if asset.get('name') == preferred:
                      print(json.dumps(asset))
                      sys.exit(0)
          names = ', '.join(a.get('name', '') for a in assets)
          print(f\"Release '{tag}' is missing SN2-DF.zip, SDF.zip, or main.dll. Found: {names}\", file=sys.stderr)
          sys.exit(1)
          ")"
            asset_name="$(python -c "import json,sys; print(json.loads(sys.argv[1])['name'])" "$asset_json")"
            log "Installing SN2-DF from $repo release $release_tag ($asset_name)..."
            local temp_root download_path
            temp_root="$(mktemp -d "${TMPDIR:-/tmp}/sn2-df-release-XXXXXX")"
            download_path="$temp_root/$asset_name"
            python -c "
          import json, os, subprocess, sys
          asset = json.loads(sys.argv[1])
          dest = sys.argv[2]
          url = asset.get('browser_download_url')
          headers = []
          token = os.environ.get('GITHUB_TOKEN')
          if not url:
              url = asset.get('url')
              headers = ['-H', 'Accept: application/octet-stream']
              if token:
                  headers.extend(['-H', f'Authorization: Bearer {token}'])
          elif token:
              headers = ['-H', f'Authorization: Bearer {token}']
          cmd = ['curl', '-fsSL', *headers, '-o', dest, url]
          subprocess.check_call(cmd)
          " "$asset_json" "$download_path"
            if [[ "$asset_name" == *.zip ]]; then
              archive_validate "$download_path" "$asset_name" || fail "Download failed: $download_path is not a valid zip or tar archive."
            elif [[ "$asset_name" == *.dll ]]; then
              python -c "
          import os, sys
          path = sys.argv[1]
          if not os.path.isfile(path) or os.path.getsize(path) < 1:
              raise SystemExit(f'Download failed: missing or empty DLL at {path}')
          with open(path, 'rb') as handle:
              if handle.read(2) != b'MZ':
                  raise SystemExit(f'Download failed: {path} is not a valid PE DLL.')
          " "$download_path"
            else
              fail "Download failed: unsupported asset type: $asset_name"
            fi
            if [[ "$asset_name" == *.zip ]]; then
              local extract_dir="$temp_root/extract" subnautica_root packaged_root packaged_base target_subnautica mods_dir dll_path
              mkdir -p "$extract_dir"
              archive_extract "$download_path" "$extract_dir"
              subnautica_root="$(find "$extract_dir" -type d -name Subnautica2 | head -1)"
              [ -n "$subnautica_root" ] || fail "$asset_name does not contain a Subnautica2/ folder."
              packaged_root="$packaged_mod_dir"
              packaged_base=""
              while [ -n "$packaged_root" ]; do
                packaged_base="$(basename "$packaged_root")"
                if [ "$packaged_base" = "SN2-DF" ] || [ "$packaged_base" = "SDF" ]; then
                  break
                fi
                packaged_root="$(dirname "$packaged_root")"
              done
              { [ -n "$packaged_root" ] && { [ "$packaged_base" = "SN2-DF" ] || [ "$packaged_base" = "SDF" ]; }; } || \
                fail "Could not resolve Packaged/SN2-DF or Packaged/SDF root from $packaged_mod_dir"
              target_subnautica="$packaged_root/Subnautica2"
              rm -rf "$target_subnautica"
              cp -R "$subnautica_root" "$target_subnautica"
              mods_dir="$(dirname "$packaged_mod_dir")"
              if [ -d "$mods_dir/SN2-DF" ] && [ ! -d "$mods_dir/SDF" ]; then
                mv "$mods_dir/SN2-DF" "$mods_dir/SDF"
                log "Renamed release mod folder $mods_dir/SN2-DF -> SDF"
              elif [ -d "$mods_dir/SN2-DF" ] && [ -d "$mods_dir/SDF" ]; then
                rm -rf "$mods_dir/SN2-DF"
                log "Removed duplicate release mod folder $mods_dir/SN2-DF (keeping SDF)"
              fi
              dll_path="$packaged_mod_dir/dlls/main.dll"
              [ -f "$dll_path" ] || fail "$asset_name installed but main.dll is missing at $dll_path"
              mkdir -p "$packaged_mod_dir/license"
              cp -R "$license_source/." "$packaged_mod_dir/license/"
              : > "$packaged_mod_dir/enabled.txt"
            else
              mkdir -p "$packaged_mod_dir/dlls"
              cp -f "$download_path" "$packaged_mod_dir/dlls/main.dll"
              find "$packaged_mod_dir" -maxdepth 1 -type f -name 'LICENSE_*.txt' -delete
              [ -d "$license_source" ] || fail "SN2-DF license source not found: $license_source"
              mkdir -p "$packaged_mod_dir/license"
              cp -R "$license_source/." "$packaged_mod_dir/license/"
              : > "$packaged_mod_dir/enabled.txt"
            fi
            cat > "$packaged_mod_dir/SN2-DF_RELEASE.txt" <<EOF
          repo=$repo
          tag=$release_tag
          asset=$asset_name
          installed=$(date -Iseconds)
          EOF
            rm -rf "$temp_root"
            log "SN2-DF installed to $packaged_mod_dir"
          }

          install_sn2_df_from_github_release() {
            if [ "${SN2_DF_USE_LOCAL_BUILD:-}" = "1" ]; then
              local dll="$SN2_DF_PACKAGED_MOD/dlls/main.dll"
              [ -f "$dll" ] || fail "SN2_DF_USE_LOCAL_BUILD=1 but Packaged/SN2-DF/dlls/main.dll is missing"
              log "Using local SN2-DF build at $dll"
              return
            fi
            install_sn2_df_from_release "$SN2_DF_PACKAGED_MOD" "$LICENSE_SOURCE"
          }

          remove_stale_loader_mods() {
            log "Removing stale misplaced loader mods from packaged content mod roots..."
            for mod_root in "${MOD_ROOTS[@]}"; do
              for misplaced_loader in SDF SN2-DF; do
                local misplaced="$mod_root/$misplaced_loader"
                if [ -d "$misplaced" ]; then
                  rm -rf "$misplaced"
                  log "Removed misplaced loader at $misplaced"
                fi
              done
              for mod_dir in "$mod_root"/*; do
                [ -d "$mod_dir" ] || continue
                local wrong_name="$mod_dir/SN2-DF"
                if [ -d "$wrong_name" ]; then
                  rm -rf "$wrong_name"
                  log "Removed wrongly named data folder $wrong_name (use SDF/)"
                fi
              done
            done
          }

          ensure_packaged_sn2_df() {
            local mod_name="$1"
            local sdf_data="$PACKAGED_DIR/$mod_name/Subnautica2/Binaries/Win64/ue4ss/Mods/$mod_name/SDF"
            [ -d "$sdf_data" ] || fail "Packaged SDF data folder not found for ${mod_name}: $sdf_data"
            log "Found packaged SDF data for $mod_name"
          }

          install_realistic_survival_license() {
            local src="$REPO_ROOT/LICENSE" dst="$RC_MODS/RealisticCraft/LICENSE"
            [ -f "$src" ] || fail "Realistic Survival LICENSE not found: $src"
            cp -f "$src" "$dst"
            log "Installed Realistic Survival LICENSE at $dst"
          }

          cleanup_realistic_scans() {
            local target_root="$RS_SCAN_MODS/RealisticScans"
            : > "$target_root/enabled.txt"
            for legacy in Scripts Blueprints; do
              local path="$target_root/$legacy"
              if [ -e "$path" ]; then
                rm -rf "$path"
                log "Removed legacy RealisticScans/$legacy"
              fi
            done
          }

          prepare_packaged_mods() {
            install_realistic_survival_license
            for name in RealisticCraft RealisticCraft_Plus RealisticScans; do
              ensure_packaged_sn2_df "$name"
            done
            for mod_root in \
              "$RC_MODS/RealisticCraft" \
              "$RCP_MODS/RealisticCraft_Plus" \
              "$RS_SCAN_MODS/RealisticScans"; do
              : > "$mod_root/enabled.txt"
            done
            local misplaced="$RC_MODS/RealisticCraft/Builder.toml"
            if [ -f "$misplaced" ]; then
              rm -f "$misplaced"
              log "Removed misplaced RealisticCraft/Builder.toml"
            fi
            cleanup_realistic_scans
          }

          build_content_paks() {
            ensure_native_directory "$PACKAGED_DIR/RealisticCraft/Subnautica2/Content/Paks/~mods/RealisticCraft"
            ensure_native_directory "$PACKAGED_DIR/RealisticCraft_Plus/Subnautica2/Content/Paks/~mods/RealisticCraft_Plus"
            invoke_retoc_to_zen \
              "$SOURCE/RealisticCraft_Main" \
              "$PACKAGED_DIR/RealisticCraft/Subnautica2/Content/Paks/~mods/RealisticCraft/RealisticCraft_P.utoc" \
              RealisticCraft_Main
            invoke_retoc_to_zen \
              "$SOURCE/RealisticCraft_StringData" \
              "$PACKAGED_DIR/RealisticCraft/Subnautica2/Content/Paks/~mods/RealisticCraft/Descriptions_P.utoc" \
              RealisticCraft_StringData
            invoke_retoc_to_zen \
              "$SOURCE/RealisticCraft_Items" \
              "$PACKAGED_DIR/RealisticCraft_Plus/Subnautica2/Content/Paks/~mods/RealisticCraft_Plus/ExtraItems_P.utoc" \
              RealisticCraft_Items
          }

          new_mod_zip() {
            local mod_name="$1"
            local src_dir="$PACKAGED_DIR/$mod_name/Subnautica2"
            local zip_file="$PACKAGED_DIR/$mod_name.zip"
            [ -d "$src_dir" ] || fail "Cannot zip ${mod_name}; missing $src_dir"
            rm -f "$zip_file"
            log "Zipping $mod_name -> $zip_file"
            archive_create "$PACKAGED_DIR/$mod_name" "$zip_file"
            local size
            size="$(wc -c < "$zip_file" | tr -d ' ')"
            log "Created $zip_file ($size bytes)"
            echo "$zip_file"
          }

          [ -d "$PACKAGED_DIR" ] || fail "Packaged directory not found: $PACKAGED_DIR"
          [ -d "$SOURCE" ] || fail "Source directory not found: $SOURCE"

          ensure_retoc
          install_sn2_df_from_github_release
          remove_stale_loader_mods
          prepare_packaged_mods

          if [ "${SKIP_PAK_BUILD:-}" != "true" ]; then
            build_content_paks
          else
            log "Skipping pak build (SKIP_PAK_BUILD=true)"
          fi

          content_zip_files=()
          for mod_name in "${CONTENT_RELEASE_MODS[@]}"; do
            content_zip_files+=("$(new_mod_zip "$mod_name")")
          done

          sn2_df_dll="$SN2_DF_PACKAGED_MOD/dlls/main.dll"
          [ -f "$sn2_df_dll" ] || fail "SN2-DF loader not installed at $sn2_df_dll"
          new_mod_zip SN2-DF >/dev/null
          log "Built SN2-DF.zip from Subnautica2Mods release (not published to Nexus or GitHub Releases)"

          release_version="$(get_mod_release_version)"
          write_output release_version "$release_version"
          write_output content_zip_count "${#content_zip_files[@]}"
          log "Package phase finished"

      - name: Upload content mod zips
        uses: actions/upload-artifact@v4
        with:
          name: mod-zips
          path: |
            Packaged/RealisticCraft.zip
            Packaged/RealisticCraft_Plus.zip
            Packaged/RealisticStorage.zip
            Packaged/RealisticScans.zip
          retention-days: 7
